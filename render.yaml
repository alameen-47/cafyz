services:
  - type: web
    name: cafyz-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false          # paste from backend/.env in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false          # paste from backend/.env in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value automatically
      - key: ALLOWED_ORIGIN
        value: https://cafyz.ametronyx.com
      - key: APP_URL
        value: https://cafyz.ametronyx.com
      # Set in Render dashboard (see backend/.env.example):
      # RESEND_API_KEY, CLOUDINARY_*, FOUNDER_EMAIL, FOUNDER_PASSWORD, FIREBASE_SERVER_KEY

  # Optional: host web-v2 on Render (canonical web deploy is Vercel).
  - type: web
    name: cafyz-web
    runtime: node
    rootDir: web-v2
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
